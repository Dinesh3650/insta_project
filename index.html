<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>SheetD4 - Instagram Manager</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>

<body>

    <aside id="sidebar">
        <div class="logo">SheetD4</div>
        
        <!-- Quick Add Section -->
        <div style="padding: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.7;">Quick Add Post</div>
            <input type="text" id="new-post-url" placeholder="Paste Instagram Link..." 
                style="width: 100%; padding: 10px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color); margin-bottom: 8px; font-size: 13px;">
            <select id="new-post-cat" style="width: 100%; padding: 10px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color); margin-bottom: 8px; font-size: 13px;">
                <!-- Categories populated by JS -->
            </select>
            <button onclick="addPost()" 
                style="width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">
                Add Post
            </button>
            <div id="add-status" style="font-size: 11px; margin-top: 8px; min-height: 14px;"></div>
        </div>

        <div id="nav-list"></div>
        <button onclick="createNewCategory()"
            style="margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.5); border: 1px dashed var(--accent); border-radius: 8px; color: var(--accent); font-weight: 600; cursor: pointer; transition: all 0.3s ease;"
            onmouseover="this.style.background='rgba(255,255,255,0.9)'"
            onmouseout="this.style.background='rgba(255,255,255,0.5)'">+ New Category</button>
    </aside>

    <main>
        <div class="header">
            <h1 id="current-category">All Posts</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="theme-toggle" onclick="toggleTheme()" class="theme-toggle-btn">🌙 Dark Mode</button>
                <input type="text" class="search-bar" id="search" placeholder="Search saved posts...">
            </div>
        </div>
        <div class="grid" id="post-grid"></div>
    </main>

    <script>
        // Theme initialization
        const themeBtn = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeBtn.innerHTML = '☀️ Light Mode';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeBtn.innerHTML = '☀️ Light Mode';
            } else {
                localStorage.setItem('theme', 'light');
                themeBtn.innerHTML = '🌙 Dark Mode';
            }
        }

        /* --- QUICK ADD LOGIC --- */
        async function addPost() {
            const urlInput = document.getElementById('new-post-url');
            const catInput = document.getElementById('new-post-cat');
            const url = urlInput.value.trim();
            const selectedCat = catInput.value;
            const status = document.getElementById('add-status');

            if (!url) {
                status.innerText = "⚠️ Please paste a link";
                status.style.color = "#ff9800";
                return;
            }

            status.innerText = "⏳ Fetching & Updating...";
            status.style.color = "var(--text-color)";

            try {
                // 1. Scrape metadata using Cloud Backend
                // (Using localhost for now until you deploy, but you can change it to your Render URL)
                const BACKEND_URL = 'http://127.0.0.1:10000/api/scrape_post';
                
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    // 2. Save directly to Firebase from the frontend!
                    const newPost = result.post;
                    newPost.cat = selectedCat; // Apply the selected category
                    
                    const newPostRef = db.ref('posts').push();
                    await newPostRef.set(newPost);
                    
                    status.innerText = `✅ Successfully added to "${selectedCat}"`;
                    status.style.color = "#4CAF50";
                    setTimeout(() => {
                        status.innerText = "";
                        urlInput.value = "";
                    }, 3000);
                } else {
                    status.innerText = "❌ " + (result.message || "Failed");
                    status.style.color = "#f44336";
                }
            } catch (err) {
                status.innerText = "❌ Backend API error";
                status.style.color = "#f44336";
                console.error(err);
            }
        }

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC9U2lQUrBeY-_hMpI2lzMw6UVZgw_txfk",
            authDomain: "insta-manager-d4649.firebaseapp.com",
            databaseURL: "https://insta-manager-d4649-default-rtdb.firebaseio.com",
            projectId: "insta-manager-d4649",
            storageBucket: "insta-manager-d4649.firebasestorage.app",
            messagingSenderId: "1080647191548",
            appId: "1:1080647191548:web:2552d62509ec29b0008079"
        };

        // Initialize Firebase using the Compat SDK (already loaded in head)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // DATA_START
        let posts = [];
        
        // Listen for posts from Firebase
        db.ref('posts').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                posts = Array.isArray(data) ? data : Object.values(data);
                // Filter out any null items
                posts = posts.filter(p => p !== null);
            } else {
                posts = [];
            }
            renderPosts();
        });
        const baseCategories = ["Career & Resume", "AI & Automation", "Software & Data", "Fitness & Workout", "Accounting & Business", "Food & Cooking", "Travel & Life", "Other"];
        const savedCustomCategories = JSON.parse(localStorage.getItem('customCategories')) || [];

        // Apply saved post categories to the posts list
        const savedPostCats = JSON.parse(localStorage.getItem('postCategories')) || {};
        posts.forEach(p => {
            if (savedPostCats[p.url]) {
                p.cat = savedPostCats[p.url];
            }
        });

        let categories = [...new Set([...baseCategories, ...savedCustomCategories, ...posts.map(p => p.cat)])].filter(Boolean);
        let currentFilter = 'All';

        // --- HELPER: ENCODE URL FOR FIREBASE KEYS (Firebase doesn't allow dots in keys) ---
        function encodeUrl(url) {
            return btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
        }

        // --- REAL-TIME SYNC ---
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const cloudPostCats = data.postCategories || {};
            const cloudCustomCats = data.customCategories || [];

            // Update custom categories
            cloudCustomCats.forEach(cat => {
                if (!categories.includes(cat)) categories.push(cat);
            });

            // Update post mappings
            posts.forEach(p => {
                const key = encodeUrl(p.url);
                if (cloudPostCats[key]) {
                    p.cat = cloudPostCats[key];
                }
            });

            renderNav();
            renderPosts();
        });

        function renderNav() {
            const navList = document.getElementById('nav-list');
            const counts = { 'All': posts.length };
            posts.forEach(p => counts[p.cat] = (counts[p.cat] || 0) + 1);

            let html = `<div class="nav-item ${currentFilter === 'All' ? 'active' : ''}" onclick="setFilter('All')">
            <span>All Posts</span><span class="count">${counts['All']}</span>
        </div>`;

            categories.sort().forEach(cat => {
                html += `<div class="nav-item ${currentFilter === cat ? 'active' : ''}" onclick="setFilter('${cat}')">
                <span>${cat}</span>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="count">${counts[cat] || 0}</span>
                    <button onclick="editCategory('${cat.replace(/'/g, "\\'")}', event)" style="background:transparent; border:none; cursor:pointer; color:inherit; font-size:14px; padding:0; display:flex; align-items:center;" title="Edit Category">✏️</button>
                </div>
            </div>`;
            });
            navList.innerHTML = html;

            // Also update the "Quick Add" category dropdown
            const quickAddCat = document.getElementById('new-post-cat');
            if (quickAddCat) {
                quickAddCat.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
                // Default to 'Other' or the first one
                quickAddCat.value = categories.includes('Other') ? 'Other' : categories[0];
            }
        }

        function renderPosts() {
            const grid = document.getElementById('post-grid');
            const searchInput = document.getElementById('search').value.toLowerCase();

            const filtered = posts.filter(p => {
                const matchCat = currentFilter === 'All' || p.cat === currentFilter;
                const matchSearch = (p.text || "").toLowerCase().includes(searchInput);
                return matchCat && matchSearch;
            });

            grid.innerHTML = filtered.map((p) => {
                const globalIdx = posts.indexOf(p);
                return `
            <div class="card">
                <div class="card-image-wrapper">
                    <img src="${p.thumb || 'https://placehold.co/400x400?text=No+Image'}" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                </div>
                <div class="card-body">
                    <p class="card-text">${(p.text || "").substring(0, 80)}...</p>
                    <select class="select-cat" onchange="changeCat(${globalIdx}, this.value)">
                        ${categories.map(c => `<option value="${c}" ${p.cat === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                    <a href="${p.url}" target="_blank" class="btn-view">Open Link</a>
                </div>
            </div>
        `}).join('');
        }

        function setFilter(cat) {
            currentFilter = cat;
            document.getElementById('current-category').innerText = cat;
            renderNav();
            renderPosts();
        }

        function changeCat(index, newCat) {
            const post = posts[index];
            post.cat = newCat;

            // Push to Firebase
            const key = encodeUrl(post.url);
            db.ref('postCategories/' + key).set(newCat);
        }

        function createNewCategory() {
            const newCat = prompt("Enter the name for the new category:");
            if (newCat && newCat.trim() !== "") {
                const cat = newCat.trim();
                if (!categories.includes(cat)) {
                    categories.push(cat);
                    
                    // Push updated list to Firebase
                    db.ref('customCategories').set(categories.filter(c => !["All", "Career & Resume", "AI & Automation", "Software & Data", "Travel & Life", "Fitness & Workout", "Food & Cooking", "Other"].includes(c)));
                } else {
                    alert("Category already exists!");
                }
            }
        }

        function editCategory(oldCat, event) {
            event.stopPropagation();
            const newCat = prompt("Enter the new name for the category:", oldCat);
            if (newCat && newCat.trim() !== "" && newCat.trim() !== oldCat) {
                const cat = newCat.trim();
                if (categories.includes(cat)) {
                    alert("Category already exists!");
                    return;
                }
                
                // Update in categories array
                const catIndex = categories.indexOf(oldCat);
                if (catIndex > -1) {
                    categories[catIndex] = cat;
                } else {
                    categories.push(cat);
                }

                // Push updated list to Firebase
                db.ref('customCategories').set(categories.filter(c => !baseCategories.includes(c)));

                // Update all posts with this category
                const updates = {};
                posts.forEach(p => {
                    if (p.cat === oldCat) {
                        p.cat = cat;
                        const key = encodeUrl(p.url);
                        updates[key] = cat;
                    }
                });
                
                if (Object.keys(updates).length > 0) {
                    db.ref('postCategories').update(updates);
                }

                if (currentFilter === oldCat) {
                    currentFilter = cat;
                    document.getElementById('current-category').innerText = cat;
                }

                renderNav();
                renderPosts();
            }
        }

        document.getElementById('search').addEventListener('input', renderPosts);

        // Init
        renderNav();
        renderPosts();
    </script>

</body>

</html>
